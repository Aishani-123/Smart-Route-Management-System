<!DOCTYPE html>
<html>
<head>
    <title>Smart Traffic System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="authBox">
    <h2>Login / Register</h2>
    <input id="username" placeholder="Username"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
    <p id="authMsg"></p>
</div>

<div id="appBox" style="display:none;">
    <div class="container">
        <h2>Route Management System</h2>

        <input id="src" placeholder="Enter Source City">
        <input id="dest" placeholder="Enter Destination City">

        <label>
            <input type="checkbox" id="emergency"> Emergency Vehicle
        </label>

        <button onclick="findRoute()">Find Best Route</button>
        <button onclick="simulateTraffic()">Simulate Traffic</button>

        <p id="result"></p>

        <canvas id="graphCanvas" width="900" height="600"></canvas>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
